<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kho học tập</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
}

header {
    background: #2c3e50;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
}

.section {
    margin: 30px;
    padding: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

h2 {
    color: #2c3e50;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 15px;
}

.card {
    background: #f4f6f7;
    padding: 20px;
    border-radius: 10px;
    text-decoration: none;
    color: #2c3e50;
    font-size: 16px;
    transition: 0.2s;
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    cursor: pointer;
}

.card:hover {
    background: #2c3e50;
    color: white;
    transform: scale(1.05);
}
</style>
</head>

<body>

<header>📚 Kho học tập & Trò chơi</header>

<div class="section">
<h2>🎮 Trò chơi</h2>
<div class="grid">
<a class="card" href="games/khoi-dong-Bai11-tiet-34.html">Trắc nghiệm bài 11</a>
<a class="card" href="games/game2.html">Game Tiếng Anh</a>
</div>
</div>

<div class="section">
<h2>📄 Tài liệu PPT</h2>
<div class="grid">
<div class="card" onclick="openOffice('documents/KHBD_LQTH2_BAI 11_Tập gõ chữ cùng Wordpad.pptx')">Bài 11-Tiết 1-2</div>
<div class="card" onclick="openOffice('documents/KHBD_LQTH2_BAI 11_Tập gõ chữ cùng Wordpad - Tiết 3-4.pptx')">Bài 11-Tiết 3-4</div>
<a class="card" href="documents/toan.pdf">Tài liệu PDF</a>
</div>
</div>

<script>
function openOffice(filePath) {
    var fullUrl = window.location.origin + "/" + filePath;
    var viewer = "https://view.officeapps.live.com/op/view.aspx?src=" + fullUrl;
    window.open(viewer, "_blank");
}
</script>

</body>
</html>
